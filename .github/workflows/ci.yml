name: mkdocs-alias-plugin CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
  - cron: '0 0 * * *'

jobs:
  build-3-10:
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/snok/actions/checkout@v4
      - name: Set up Python 3.10
        uses: https://github.com/snok/actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs pytest pylint markdown setuptools
      - name: Run CI Tests
        run: pylint $(git ls-files '*.py') && pytest -vv
